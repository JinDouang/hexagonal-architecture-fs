server:
  port: 8080

spring:
  application:
    name: training-catalogue-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/training_catalogue}
    username: ${SPRING_DATASOURCE_USERNAME:training}
    password: ${SPRING_DATASOURCE_PASSWORD:training}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

app:
  security:
    enabled: ${APP_SECURITY_ENABLED:false}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  moodle:
    enabled: ${APP_MOODLE_ENABLED:false}
    base-url: ${APP_MOODLE_BASE_URL:http://localhost:9090}